<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <title>CloudNotes</title>
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #050505; /* Deepest Black */
            /* This adds a very soft glow to the corners so it's not just flat black */
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.05) 0px, transparent 50%);
        }
        .cyber-card {
            background: rgba(10, 10, 10, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 80px -20px rgba(0, 0, 0, 1);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="text-zinc-500 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl cyber-card rounded-[3rem] p-12">
        
        <header class="flex flex-col items-center mb-10 text-center">
            <div class="flex items-center gap-3 mb-4 px-4 py-1.5 bg-blue-500/5 rounded-full border border-blue-500/10">
                <span class="h-2 w-2 rounded-full bg-blue-500 animate-pulse shadow-[0_0_10px_#3b82f6]"></span>
                <span class="text-[10px] uppercase tracking-[0.4em] text-blue-400/80 font-bold">System Active</span>
            </div>
            <h1 class="text-4xl font-bold text-white tracking-tighter">CloudNotes</h1>
        </header>

        <div class="space-y-8">
            <div class="relative">
                <textarea id="note" 
                    class="w-full h-64 p-6 bg-transparent text-white placeholder-zinc-800 border-b border-zinc-900 focus:border-blue-600 focus:outline-none transition-all resize-none text-xl" 
                    placeholder="Input data..."></textarea>
            </div>

            <button onclick="sendToCloud()" 
                class="w-full h-16 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold transition-all shadow-[0_15px_30px_-10px_rgba(59,130,246,0.4)] active:scale-[0.97] flex items-center justify-center text-lg tracking-widest uppercase">
                <span id="btn-text">Sync Data</span>
            </button>

            <div id="out" class="text-center font-mono text-[11px] font-bold uppercase tracking-widest leading-relaxed h-10 mt-4"></div>
        </div>
    </div>

    <script>
        async function sendToCloud() {
            const out = document.getElementById('out');
            const btn = document.getElementById('btn-text');
            const content = document.getElementById('note').value;
            
            out.className = "text-center font-mono text-[11px] font-bold text-blue-500 animate-pulse uppercase tracking-widest mt-4";
            out.innerText = "> Initializing Transfer";
            btn.innerText = "Processing...";

            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: content })
                });
                const data = await res.json();
                
                out.className = "text-center font-mono text-[11px] font-bold text-white bg-blue-600/10 py-3 rounded-xl border border-blue-500/20 uppercase tracking-widest mt-4";
                out.innerText = `[SUCCESS] ${data.byteSize}B RECEIVED @ ${data.timestamp}`;
                
                btn.innerText = "COMPLETE";
                setTimeout(() => { btn.innerText = "Sync Data"; }, 2500);
            } catch (err) {
                out.className = "text-center font-mono text-[11px] font-bold text-red-500 uppercase tracking-widest mt-4";
                out.innerText = "> ERROR: Connection Lost";
                btn.innerText = "RETRY";
            }
        }
    </script>
</body>
</html>
