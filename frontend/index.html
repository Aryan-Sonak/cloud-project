<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <title>CloudNotes</title>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #000; }
        .cyber-card { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 0 50px -12px rgba(59, 130, 246, 0.25); }
    </style>
</head>
<body class="text-zinc-500 min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-xl cyber-card rounded-[2.5rem] p-12 backdrop-blur-3xl">
        <header class="flex flex-col items-center mb-10 text-center">
            <h1 class="text-3xl font-bold text-white tracking-tighter">CloudNotes</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-blue-500 font-bold mt-2 font-mono">Status: Online</p>
        </header>

        <div class="space-y-8">
            <textarea id="note" class="w-full h-64 p-6 bg-transparent text-zinc-100 border-b border-zinc-900 focus:border-blue-600 focus:outline-none transition-all resize-none text-lg" placeholder="Enter data..."></textarea>
            <button onclick="sendToCloud()" class="w-full h-16 bg-blue-600 hover:bg-blue-500 text-white rounded-full font-bold transition-all active:scale-95 flex items-center justify-center">
                <span id="btn-text">SYNC DATA</span>
            </button>
            <div id="out" class="text-center font-mono text-[9px] text-zinc-700 uppercase tracking-widest leading-relaxed h-4"></div>
        </div>
    </div>

    <script>
        async function sendToCloud() {
            const out = document.getElementById('out');
            const btn = document.getElementById('btn-text');
            const content = document.getElementById('note').value;
            
            out.innerText = "> Initializing...";
            btn.innerText = "UPLOADING...";

            try {
                const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: content })
                });

                if (!res.ok) throw new Error(`Server responded with ${res.status}`);

                const data = await res.json();
                out.innerText = `> Handshake Complete: ${data.byteSize}B received`;
                btn.innerText = "SUCCESS";
                setTimeout(() => { btn.innerText = "SYNC DATA"; }, 2000);
            } catch (err) {
                console.error(err);
                out.innerText = `> Error: ${err.message}`;
                btn.innerText = "RETRY";
            }
        }
    </script>
</body>
</html>
